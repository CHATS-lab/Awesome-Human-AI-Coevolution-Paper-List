<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf9f5"/>
      <stop offset="1" stop-color="#f2f0e8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- thin rule under masthead -->
  <line x1="64" y1="158" x2="1136" y2="158" stroke="#e6e3d8" stroke-width="1.5"/>

  <!-- accent rule before eyebrow -->
  <line x1="64" y1="118" x2="100" y2="118" stroke="#1e3a5f" stroke-width="2"/>

  <g font-family="ui-serif, Georgia, 'Times New Roman', serif">
    <!-- eyebrow: mono, navy rule -->
    <text x="116" y="124" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="14" letter-spacing="2.2" fill="#6e6c64">A CURATED PAPER LIST</text>

    <!-- HAI mark on the right -->
    <text x="1136" y="124" text-anchor="end"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="14" letter-spacing="2.2" fill="#6e6c64">HAI · 110 ENTRIES</text>

    <!-- title (serif headline) -->
    <text x="64" y="260" font-size="64" font-weight="500" fill="#1f1d1a"
          letter-spacing="-1.1">Research on <tspan font-style="italic" fill="#1e3a5f">human–AI coevolution</tspan>,</text>
    <text x="64" y="338" font-size="64" font-weight="500" fill="#1f1d1a"
          letter-spacing="-1.1">kept current and easy to search.</text>

    <!-- subtitle -->
    <text x="64" y="416" font-size="22" fill="#4a473f"
          font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">Papers where humans and AI demonstrably shape each other —</text>
    <text x="64" y="448" font-size="22" fill="#4a473f"
          font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">training feedback, longitudinal deployment, joint creation, position pieces.</text>

    <!-- five categories as mono indices, navy -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" letter-spacing="1.6">
      <text x="64"  y="510" fill="#1e3a5f">01</text><text x="92"  y="510" fill="#4a473f">COLLABORATION</text>
      <text x="280" y="510" fill="#1e3a5f">02</text><text x="308" y="510" fill="#4a473f">MUTUAL ADAPTATION</text>
      <text x="540" y="510" fill="#1e3a5f">03</text><text x="568" y="510" fill="#4a473f">FEEDBACK LOOPS</text>
      <text x="760" y="510" fill="#1e3a5f">04</text><text x="788" y="510" fill="#4a473f">LONGITUDINAL HCI</text>
      <text x="990" y="510" fill="#1e3a5f">05</text><text x="1018" y="510" fill="#4a473f">POSITION &amp; SURVEY</text>
    </g>

    <!-- bottom rule -->
    <line x1="64" y1="560" x2="1136" y2="560" stroke="#e6e3d8" stroke-width="1.5"/>

    <!-- footer URL -->
    <text x="64" y="592" font-size="16" fill="#6e6c64"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace" letter-spacing="0.6">xli04.github.io/Awesome-Human-AI-Coevolution-Paper-List</text>
  </g>
</svg>
